<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Periodiq — Design Mockup v2</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    /* ============================================
       DESIGN TOKENS
       ============================================ */
    :root {
      --font-sans: 'Inter', -apple-system, sans-serif;
      --font-mono: 'JetBrains Mono', monospace;
      --tile-gap: 2px;
      --tile-size: 68px;
      --tile-radius: 6px;
      --ease-out: cubic-bezier(0.16, 1, 0.3, 1);
      --ease-spring: cubic-bezier(0.34, 1.56, 0.64, 1);
      --duration-fast: 150ms;
      --duration-normal: 300ms;
      --duration-slow: 500ms;
    }

    /* ============================================
       DARK THEME — Chemistry Sci-Fi
       ============================================ */
    [data-theme="dark"] {
      --bg-primary: #06060b;
      --bg-secondary: #0c0c14;
      --bg-surface: #13131e;
      --bg-tile: #0f0f18;
      --bg-tile-hover: #1a1a28;
      --bg-glass: rgba(12, 12, 20, 0.85);
      --bg-glass-border: rgba(255, 255, 255, 0.06);

      --text-primary: #e4e4ef;
      --text-secondary: #7a7a95;
      --text-muted: #44445a;
      --text-dim: #2a2a3a;

      --accent-primary: #d4a843;
      --accent-warm: #e8943a;
      --accent-glow: #f5c842;
      --accent-cool: #5eead4;

      --border-subtle: rgba(255, 255, 255, 0.04);
      --border-hover: rgba(255, 255, 255, 0.1);

      --glow-intensity: 0.35;
      --shadow-tile: 0 1px 2px rgba(0,0,0,0.5);
      --shadow-tile-hover: 0 8px 32px rgba(0,0,0,0.6);
      --shadow-float: 0 8px 32px rgba(0,0,0,0.4), 0 0 0 1px rgba(255,255,255,0.05);

      --cat-alkali-metal: #ff4d6a;
      --cat-alkaline-earth: #ff9f43;
      --cat-transition-metal: #4facfe;
      --cat-post-transition: #5ab4ac;
      --cat-metalloid: #ffc048;
      --cat-nonmetal: #2ed573;
      --cat-halogen: #a78bfa;
      --cat-noble-gas: #f472b6;
      --cat-lanthanide: #22d3ee;
      --cat-actinide: #fb923c;
      --cat-unknown: #555568;

      --scanline-opacity: 0.03;
    }

    /* ============================================
       LIGHT THEME
       ============================================ */
    [data-theme="light"] {
      --bg-primary: #f2f2f6;
      --bg-secondary: #ffffff;
      --bg-surface: #e8e8ee;
      --bg-tile: #ffffff;
      --bg-tile-hover: #f5f5fa;
      --bg-glass: rgba(255, 255, 255, 0.88);
      --bg-glass-border: rgba(0, 0, 0, 0.08);

      --text-primary: #14142b;
      --text-secondary: #5a5a72;
      --text-muted: #9999aa;
      --text-dim: #ccccdd;

      --accent-primary: #b8860b;
      --accent-warm: #d4760a;
      --accent-glow: #daa520;
      --accent-cool: #0d9488;

      --border-subtle: rgba(0, 0, 0, 0.06);
      --border-hover: rgba(0, 0, 0, 0.12);

      --glow-intensity: 0.12;
      --shadow-tile: 0 1px 3px rgba(0,0,0,0.06);
      --shadow-tile-hover: 0 8px 24px rgba(0,0,0,0.1);
      --shadow-float: 0 8px 32px rgba(0,0,0,0.08), 0 0 0 1px rgba(0,0,0,0.06);

      --cat-alkali-metal: #dc2626;
      --cat-alkaline-earth: #ea580c;
      --cat-transition-metal: #2563eb;
      --cat-post-transition: #0d9488;
      --cat-metalloid: #ca8a04;
      --cat-nonmetal: #16a34a;
      --cat-halogen: #7c3aed;
      --cat-noble-gas: #db2777;
      --cat-lanthanide: #0891b2;
      --cat-actinide: #c2410c;
      --cat-unknown: #9ca3af;

      --scanline-opacity: 0;
    }

    /* ============================================
       BASE
       ============================================ */
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: var(--font-sans);
      background: var(--bg-primary);
      color: var(--text-primary);
      min-height: 100vh;
      overflow-x: auto;
      transition: background var(--duration-slow) var(--ease-out),
                  color var(--duration-slow) var(--ease-out);
    }

    /* Subtle noise texture overlay */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 9999;
      opacity: 0.5;
    }

    /* ============================================
       FLOATING CHROME — HUD-style controls
       ============================================ */

    /* Top-left: Logo mark */
    .brand {
      position: fixed;
      top: 20px;
      left: 24px;
      z-index: 50;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .brand-mark {
      width: 32px;
      height: 32px;
      border-radius: 8px;
      background: linear-gradient(135deg, var(--accent-primary), var(--accent-warm));
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: var(--font-mono);
      font-weight: 800;
      font-size: 14px;
      color: #000;
      box-shadow: 0 2px 12px rgba(212, 168, 67, 0.25);
    }

    .brand-text {
      font-family: var(--font-mono);
      font-weight: 700;
      font-size: 15px;
      color: var(--text-primary);
      letter-spacing: -0.5px;
    }

    .brand-text .dot {
      color: var(--accent-primary);
    }

    .brand-text .tld {
      color: var(--text-muted);
      font-weight: 400;
    }

    /* Top-center: Floating command bar */
    .command-bar {
      position: fixed;
      top: 16px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 50;
      display: flex;
      align-items: center;
      gap: 2px;
      background: var(--bg-glass);
      backdrop-filter: blur(20px) saturate(1.5);
      -webkit-backdrop-filter: blur(20px) saturate(1.5);
      border: 1px solid var(--bg-glass-border);
      border-radius: 14px;
      padding: 4px;
      box-shadow: var(--shadow-float);
    }

    .cmd-tab {
      padding: 7px 16px;
      border-radius: 10px;
      font-size: 12px;
      font-weight: 500;
      color: var(--text-secondary);
      cursor: pointer;
      border: none;
      background: none;
      font-family: var(--font-sans);
      transition: all var(--duration-fast) var(--ease-out);
      white-space: nowrap;
      letter-spacing: 0.01em;
    }

    .cmd-tab:hover {
      color: var(--text-primary);
      background: rgba(255,255,255,0.04);
    }

    .cmd-tab.active {
      color: var(--text-primary);
      background: var(--bg-surface);
      box-shadow: 0 1px 4px rgba(0,0,0,0.15);
      font-weight: 600;
    }

    .cmd-divider {
      width: 1px;
      height: 20px;
      background: var(--border-subtle);
      margin: 0 4px;
    }

    .cmd-search {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 7px 12px;
      border-radius: 10px;
      color: var(--text-muted);
      cursor: pointer;
      border: none;
      background: none;
      font-family: var(--font-sans);
      font-size: 12px;
      transition: all var(--duration-fast) var(--ease-out);
    }

    .cmd-search:hover {
      color: var(--text-secondary);
      background: rgba(255,255,255,0.04);
    }

    .cmd-search kbd {
      font-family: var(--font-sans);
      font-size: 10px;
      padding: 1px 5px;
      border-radius: 4px;
      background: var(--bg-surface);
      border: 1px solid var(--border-subtle);
      color: var(--text-muted);
    }

    /* Top-right: Utility controls */
    .utility-bar {
      position: fixed;
      top: 16px;
      right: 24px;
      z-index: 50;
      display: flex;
      align-items: center;
      gap: 6px;
      background: var(--bg-glass);
      backdrop-filter: blur(20px) saturate(1.5);
      -webkit-backdrop-filter: blur(20px) saturate(1.5);
      border: 1px solid var(--bg-glass-border);
      border-radius: 12px;
      padding: 4px;
      box-shadow: var(--shadow-float);
    }

    .util-btn {
      width: 30px;
      height: 30px;
      border-radius: 8px;
      border: none;
      background: none;
      color: var(--text-muted);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      transition: all var(--duration-fast) var(--ease-out);
    }

    .util-btn:hover {
      color: var(--text-primary);
      background: rgba(255,255,255,0.06);
    }

    .util-btn.active {
      color: var(--accent-primary);
    }

    /* Bottom-center: Property mode selector */
    .property-bar {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 50;
      display: flex;
      align-items: center;
      gap: 0;
      background: var(--bg-glass);
      backdrop-filter: blur(20px) saturate(1.5);
      -webkit-backdrop-filter: blur(20px) saturate(1.5);
      border: 1px solid var(--bg-glass-border);
      border-radius: 14px;
      padding: 4px;
      box-shadow: var(--shadow-float);
    }

    .prop-chip {
      padding: 6px 12px;
      border-radius: 10px;
      font-size: 11px;
      font-weight: 500;
      color: var(--text-muted);
      cursor: pointer;
      border: none;
      background: none;
      font-family: var(--font-sans);
      transition: all var(--duration-fast) var(--ease-out);
      white-space: nowrap;
    }

    .prop-chip:hover {
      color: var(--text-secondary);
    }

    .prop-chip.active {
      color: var(--accent-primary);
      background: rgba(212, 168, 67, 0.1);
      font-weight: 600;
    }

    .prop-chip-divider {
      width: 1px;
      height: 16px;
      background: var(--border-subtle);
      margin: 0 2px;
    }

    /* Bottom-left: Legend (minimal, semi-transparent) */
    .legend {
      position: fixed;
      bottom: 20px;
      left: 24px;
      z-index: 50;
      display: flex;
      flex-direction: column;
      gap: 3px;
      opacity: 0.5;
      transition: opacity var(--duration-normal) var(--ease-out);
    }

    .legend:hover {
      opacity: 1;
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 9px;
      color: var(--text-muted);
      letter-spacing: 0.03em;
    }

    .legend-dot {
      width: 6px;
      height: 6px;
      border-radius: 2px;
      flex-shrink: 0;
    }

    /* ============================================
       PERIODIC TABLE
       ============================================ */
    .table-container {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 72px 32px 80px;
    }

    .periodic-table {
      display: grid;
      grid-template-columns: repeat(18, var(--tile-size));
      grid-template-rows: repeat(10, var(--tile-size));
      gap: var(--tile-gap);
    }

    /* ============================================
       ELEMENT TILE
       ============================================ */
    .element {
      position: relative;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      background: var(--bg-tile);
      border: 1px solid var(--border-subtle);
      border-radius: var(--tile-radius);
      cursor: pointer;
      overflow: hidden;
      transition: all var(--duration-normal) var(--ease-out);
      box-shadow: var(--shadow-tile);
      --cat-color: var(--cat-transition-metal);
    }

    /* Layer 1: Category accent (left edge) */
    .element::before {
      content: '';
      position: absolute;
      left: 0; top: 0; bottom: 0;
      width: 2.5px;
      background: var(--cat-color);
      opacity: 0.7;
      transition: all var(--duration-normal) var(--ease-out);
    }

    /* Layer 2: Ambient glow */
    .element::after {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(
        ellipse at 50% 60%,
        color-mix(in srgb, var(--cat-color) 20%, transparent) 0%,
        transparent 65%
      );
      opacity: 0;
      transition: opacity var(--duration-normal) var(--ease-out);
      pointer-events: none;
    }

    /* Hover */
    .element:hover {
      transform: scale(1.18) translateY(-3px);
      z-index: 10;
      border-color: color-mix(in srgb, var(--cat-color) 50%, transparent);
      box-shadow: var(--shadow-tile-hover),
                  0 0 40px color-mix(in srgb, var(--cat-color) 15%, transparent);
      background: var(--bg-tile-hover);
    }

    .element:hover::before {
      width: 100%;
      opacity: 0.08;
      border-radius: var(--tile-radius);
    }

    .element:hover::after { opacity: 1; }

    .element .atomic-number {
      font-size: 8px;
      color: var(--text-dim);
      position: absolute;
      top: 4px; left: 6px;
      font-family: var(--font-mono);
      font-weight: 500;
    }

    .element .symbol {
      font-size: 22px;
      font-weight: 700;
      letter-spacing: -0.5px;
      line-height: 1;
      color: var(--text-primary);
      position: relative;
      z-index: 1;
      transition: all var(--duration-fast) var(--ease-out);
    }

    .element:hover .symbol {
      color: var(--cat-color);
      text-shadow: 0 0 20px color-mix(in srgb, var(--cat-color) 30%, transparent);
    }

    .element .name {
      font-size: 7px;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-top: 2px;
      position: relative;
      z-index: 1;
    }

    .element .mass {
      font-size: 7px;
      color: var(--text-dim);
      font-family: var(--font-mono);
      margin-top: 1px;
      position: relative;
      z-index: 1;
    }

    /* Selected */
    .element.selected {
      border-color: var(--accent-primary);
      box-shadow: 0 0 0 1px var(--accent-primary),
                  0 0 30px rgba(212, 168, 67, 0.15);
    }

    .element.selected .symbol {
      color: var(--accent-primary);
    }

    /* State indicators */
    .element .state-dot {
      width: 3px; height: 3px;
      border-radius: 50%;
      position: absolute;
      top: 5px; right: 5px;
    }
    .element .state-dot.solid { background: var(--text-dim); }
    .element .state-dot.liquid { background: #4dabf7; }
    .element .state-dot.gas { background: #69db7c; }

    /* === Living element effects === */

    /* Gas elements: floating particles */
    .element[data-state="gas"] {
      --particle-color: var(--cat-color);
    }
    .element[data-state="gas"] .gas-particles {
      position: absolute;
      inset: 0;
      pointer-events: none;
      z-index: 0;
      overflow: hidden;
      opacity: 0;
      transition: opacity var(--duration-normal) var(--ease-out);
    }
    .element[data-state="gas"]:hover .gas-particles { opacity: 1; }
    .element[data-state="gas"] .gas-particles span {
      position: absolute;
      width: 2px; height: 2px;
      border-radius: 50%;
      background: var(--cat-color);
      opacity: 0.5;
      animation: float-particle 3s ease-in-out infinite;
    }
    .element[data-state="gas"] .gas-particles span:nth-child(1) { left: 20%; top: 70%; animation-delay: 0s; animation-duration: 2.5s; }
    .element[data-state="gas"] .gas-particles span:nth-child(2) { left: 50%; top: 80%; animation-delay: 0.5s; animation-duration: 3s; }
    .element[data-state="gas"] .gas-particles span:nth-child(3) { left: 70%; top: 60%; animation-delay: 1s; animation-duration: 2.8s; }
    .element[data-state="gas"] .gas-particles span:nth-child(4) { left: 35%; top: 75%; animation-delay: 1.5s; animation-duration: 3.2s; }
    .element[data-state="gas"] .gas-particles span:nth-child(5) { left: 60%; top: 85%; animation-delay: 0.8s; animation-duration: 2.6s; }

    @keyframes float-particle {
      0% { transform: translateY(0) scale(1); opacity: 0; }
      20% { opacity: 0.6; }
      80% { opacity: 0.3; }
      100% { transform: translateY(-40px) scale(0.5); opacity: 0; }
    }

    /* Liquid elements: ripple shimmer */
    .element[data-state="liquid"] .liquid-effect {
      position: absolute;
      inset: 0;
      pointer-events: none;
      z-index: 0;
      overflow: hidden;
      opacity: 0;
      transition: opacity var(--duration-normal) var(--ease-out);
    }
    .element[data-state="liquid"]:hover .liquid-effect { opacity: 1; }
    .element[data-state="liquid"] .liquid-effect::before {
      content: '';
      position: absolute;
      bottom: 0; left: -20%; right: -20%;
      height: 30px;
      background: linear-gradient(transparent, color-mix(in srgb, var(--cat-color) 12%, transparent));
      animation: liquid-wave 2s ease-in-out infinite;
    }

    @keyframes liquid-wave {
      0%, 100% { transform: translateY(0) scaleY(1); }
      50% { transform: translateY(-3px) scaleY(1.1); }
    }

    /* Radioactive: pulsing glow ring */
    .element.radioactive::after {
      animation: radioactive-pulse 3s ease-in-out infinite;
    }

    @keyframes radioactive-pulse {
      0%, 100% { opacity: 0.05; }
      50% { opacity: 0.2; }
    }

    /* Metal shimmer on hover */
    .element[data-metal="metal"] .metal-sheen {
      position: absolute;
      inset: 0;
      background: linear-gradient(
        105deg,
        transparent 40%,
        rgba(255,255,255,0.04) 45%,
        rgba(255,255,255,0.08) 50%,
        rgba(255,255,255,0.04) 55%,
        transparent 60%
      );
      transform: translateX(-100%);
      pointer-events: none;
      z-index: 0;
    }
    .element[data-metal="metal"]:hover .metal-sheen {
      animation: metal-sweep 1.2s var(--ease-out) forwards;
    }

    @keyframes metal-sweep {
      to { transform: translateX(100%); }
    }

    /* Category colors */
    .element[data-category="alkali-metal"] { --cat-color: var(--cat-alkali-metal); }
    .element[data-category="alkaline-earth-metal"] { --cat-color: var(--cat-alkaline-earth); }
    .element[data-category="transition-metal"] { --cat-color: var(--cat-transition-metal); }
    .element[data-category="post-transition-metal"] { --cat-color: var(--cat-post-transition); }
    .element[data-category="metalloid"] { --cat-color: var(--cat-metalloid); }
    .element[data-category="nonmetal"] { --cat-color: var(--cat-nonmetal); }
    .element[data-category="halogen"] { --cat-color: var(--cat-halogen); }
    .element[data-category="noble-gas"] { --cat-color: var(--cat-noble-gas); }
    .element[data-category="lanthanide"] { --cat-color: var(--cat-lanthanide); }
    .element[data-category="actinide"] { --cat-color: var(--cat-actinide); }
    .element[data-category="unknown"] { --cat-color: var(--cat-unknown); }

    /* ============================================
       SIDEBAR
       ============================================ */
    .sidebar {
      position: fixed;
      right: 0; top: 0; bottom: 0;
      width: 380px;
      background: var(--bg-glass);
      backdrop-filter: blur(30px) saturate(1.5);
      -webkit-backdrop-filter: blur(30px) saturate(1.5);
      border-left: 1px solid var(--bg-glass-border);
      padding: 28px 24px;
      transform: translateX(100%);
      transition: transform var(--duration-normal) var(--ease-out);
      z-index: 100;
      overflow-y: auto;
    }

    .sidebar.open { transform: translateX(0); }

    .sidebar-close {
      position: absolute;
      top: 14px; right: 14px;
      background: var(--bg-surface);
      border: 1px solid var(--border-subtle);
      color: var(--text-muted);
      width: 28px; height: 28px;
      border-radius: 8px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      transition: all var(--duration-fast) var(--ease-out);
    }
    .sidebar-close:hover {
      color: var(--text-primary);
      border-color: var(--border-hover);
    }

    .sidebar-hero {
      display: flex;
      align-items: flex-end;
      gap: 16px;
      margin-bottom: 20px;
      padding-bottom: 20px;
      border-bottom: 1px solid var(--border-subtle);
    }

    .sidebar-symbol-wrap {
      position: relative;
      width: 72px;
      height: 72px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 14px;
      overflow: hidden;
    }

    /* Living bg effect in sidebar symbol */
    .sidebar-symbol-wrap .bg-effect {
      position: absolute;
      inset: 0;
      opacity: 0.15;
    }

    .sidebar-symbol-wrap .bg-effect.gas-bg {
      background: radial-gradient(circle at 30% 40%, var(--cat-color), transparent 60%),
                  radial-gradient(circle at 70% 60%, var(--cat-color), transparent 60%);
      animation: gas-breathe 4s ease-in-out infinite;
    }

    .sidebar-symbol-wrap .bg-effect.liquid-bg {
      background: linear-gradient(180deg, transparent 40%, var(--cat-color) 100%);
      animation: liquid-breathe 3s ease-in-out infinite;
    }

    .sidebar-symbol-wrap .bg-effect.solid-bg {
      background: var(--cat-color);
      opacity: 0.08;
    }

    @keyframes gas-breathe {
      0%, 100% { opacity: 0.12; transform: scale(1); }
      50% { opacity: 0.22; transform: scale(1.05); }
    }

    @keyframes liquid-breathe {
      0%, 100% { opacity: 0.12; transform: translateY(0); }
      50% { opacity: 0.2; transform: translateY(-4px); }
    }

    .sidebar-symbol {
      font-size: 36px;
      font-weight: 900;
      position: relative;
      z-index: 1;
      line-height: 1;
    }

    .sidebar-meta h2 {
      font-size: 18px;
      font-weight: 700;
      letter-spacing: -0.3px;
    }

    .sidebar-meta .atomic-num {
      font-size: 12px;
      color: var(--text-muted);
      font-family: var(--font-mono);
      margin-bottom: 2px;
    }

    .sidebar-meta .category-badge {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      font-size: 10px;
      font-weight: 500;
      padding: 3px 8px;
      border-radius: 5px;
      margin-top: 6px;
      letter-spacing: 0.02em;
    }

    .sidebar-meta .category-badge .dot {
      width: 5px; height: 5px;
      border-radius: 50%;
    }

    .sidebar-props {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-top: 16px;
    }

    .prop-card {
      background: color-mix(in srgb, var(--bg-surface) 60%, transparent);
      border: 1px solid var(--border-subtle);
      border-radius: 10px;
      padding: 10px 12px;
    }

    .prop-label {
      font-size: 9px;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-bottom: 4px;
    }

    .prop-value {
      font-size: 15px;
      font-weight: 600;
      font-family: var(--font-mono);
    }

    .prop-unit {
      font-size: 10px;
      color: var(--text-muted);
      font-weight: 400;
    }

    .sidebar-summary {
      margin-top: 16px;
      font-size: 12px;
      color: var(--text-secondary);
      line-height: 1.6;
      border-top: 1px solid var(--border-subtle);
      padding-top: 16px;
    }

    .deep-dive-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      width: 100%;
      margin-top: 20px;
      padding: 11px;
      background: linear-gradient(135deg, var(--accent-primary), var(--accent-warm));
      color: #000;
      border: none;
      border-radius: 10px;
      font-size: 13px;
      font-weight: 600;
      font-family: var(--font-sans);
      cursor: pointer;
      transition: all var(--duration-fast) var(--ease-out);
      letter-spacing: -0.01em;
    }

    .deep-dive-btn:hover {
      transform: translateY(-1px);
      box-shadow: 0 6px 20px rgba(212, 168, 67, 0.3);
    }

    .deep-dive-btn .arrow {
      transition: transform var(--duration-fast) var(--ease-out);
    }

    .deep-dive-btn:hover .arrow {
      transform: translateX(3px);
    }

    /* ============================================
       UTILITY
       ============================================ */
    .empty-cell { visibility: hidden; }
  </style>
</head>

 stable known isotope, copernicium-285, has a half-life of approximately 30 seconds. Copernicium was first created in"},{"atomic_number":113,"symbol":"Nh","name":"Nihonium","atomic_mass":286.182,"category":"post-transition-metal","standard_state":"Expected to be a Solid","is_radioactive":true,"table_row":7,"table_column":13,"density":16,"melting_point":null,"boiling_point":null,"electronegativity_pauling":null,"electron_configuration":"[Rn]5f14 6d10 7s2 7p1 (predicted)","summary":"Nihonium is a synthetic chemical element; it has symbol Nh and atomic number 113. It is extremely radioactive: its most stable known isotope, nihonium-286, has a half-life of about 10 seconds. In the periodic table, nihonium is a transactinide element in the p-block. It is a member of period 7 and g"},{"atomic_number":114,"symbol":"Fl","name":"Flerovium","atomic_mass":290.192,"category":"post-transition-metal","standard_state":"Expected to be a Solid","is_radioactive":true,"table_row":7,"table_column":14,"density":11.4,"melting_point":null,"boiling_point":null,"electronegativity_pauling":null,"electron_configuration":"[Rn]7s2 7p2 5f14 6d10 (predicted)","summary":"Flerovium is a synthetic chemical element; it has symbol Fl and atomic number 114. It is an extremely radioactive, superheavy element, named after the Flerov Laboratory of Nuclear Reactions of the Joint Institute for Nuclear Research in Dubna, Russia, where the element was discovered in 1999. The la"},{"atomic_number":115,"symbol":"Mc","name":"Moscovium","atomic_mass":290.196,"category":"post-transition-metal","standard_state":"Expected to be a Solid","is_radioactive":true,"table_row":7,"table_column":15,"density":13.5,"melting_point":null,"boiling_point":null,"electronegativity_pauling":null,"electron_configuration":"[Rn]7s2 7p3 5f14 6d10 (predicted)","summary":"Moscovium is a synthetic chemical element; it has symbol Mc and atomic number 115. It was first synthesized in 2003 by a joint team of Russian and American scientists at the Joint Institute for Nuclear Research (JINR) in Dubna, Russia. In December 2015, it was recognized as one of four new elements "},{"atomic_number":116,"symbol":"Lv","name":"Livermorium","atomic_mass":293.205,"category":"post-transition-metal","standard_state":"Expected to be a Solid","is_radioactive":true,"table_row":7,"table_column":16,"density":12.9,"melting_point":null,"boiling_point":null,"electronegativity_pauling":null,"electron_configuration":"[Rn]7s2 7p4 5f14 6d10 (predicted)","summary":"Livermorium is a synthetic chemical element; it has symbol Lv and atomic number 116. It is an extremely radioactive element that has only been created in a laboratory setting and has not been observed in nature. The element is named after the Lawrence Livermore National Laboratory in the United Stat"},{"atomic_number":117,"symbol":"Ts","name":"Tennessine","atomic_mass":294.211,"category":"halogen","standard_state":"Expected to be a Solid","is_radioactive":true,"table_row":7,"table_column":17,"density":7.1,"melting_point":null,"boiling_point":null,"electronegativity_pauling":null,"electron_configuration":"[Rn]7s2 7p5 5f14 6d10 (predicted)","summary":"Tennessine is a synthetic element; it has symbol Ts and atomic number 117. It has the second-highest atomic number, the joint-highest atomic mass of all known elements, and is the penultimate element of the 7th period of the periodic table. It is named after the U.S. state of Tennessee, where key re"},{"atomic_number":118,"symbol":"Og","name":"Oganesson","atomic_mass":295.216,"category":"noble-gas","standard_state":"Expected to be a Gas","is_radioactive":true,"table_row":7,"table_column":18,"density":7.2,"melting_point":null,"boiling_point":null,"electronegativity_pauling":null,"electron_configuration":"[Rn]7s2 7p6 5f14 6d10 (predicted)","summary":"Oganesson is a synthetic chemical element; it has symbol Og and atomic number 118. It was first synthesized in 2002 at the Joint Institute for Nuclear Research (JINR) in Dubna, near Moscow, Russia, by a joint team of Russian and American scientists. In December 2015, it was recognized as one of four"}];

    const CATEGORIES = {
      'alkali-metal': { label: 'Alkali Metal', color: 'var(--cat-alkali-metal)' },
      'alkaline-earth-metal': { label: 'Alkaline Earth', color: 'var(--cat-alkaline-earth)' },
      'transition-metal': { label: 'Transition Metal', color: 'var(--cat-transition-metal)' },
      'post-transition-metal': { label: 'Post-transition', color: 'var(--cat-post-transition)' },
      'metalloid': { label: 'Metalloid', color: 'var(--cat-metalloid)' },
      'nonmetal': { label: 'Nonmetal', color: 'var(--cat-nonmetal)' },
      'halogen': { label: 'Halogen', color: 'var(--cat-halogen)' },
      'noble-gas': { label: 'Noble Gas', color: 'var(--cat-noble-gas)' },
      'lanthanide': { label: 'Lanthanide', color: 'var(--cat-lanthanide)' },
      'actinide': { label: 'Actinide', color: 'var(--cat-actinide)' },
      'unknown': { label: 'Unknown', color: 'var(--cat-unknown)' },
    };

    const METALLICITY_MAP = {
      'alkali-metal': 'metal', 'alkaline-earth-metal': 'metal', 'transition-metal': 'metal',
      'post-transition-metal': 'metal', 'lanthanide': 'metal', 'actinide': 'metal',
      'metalloid': 'metalloid', 'nonmetal': 'nonmetal', 'halogen': 'nonmetal', 'noble-gas': 'nonmetal',
      'unknown': 'unknown',
    };

    let elements = INLINE_ELEMENTS;

    function init() {
      renderLegend();
      renderTable();
      setupPropChips();
    }

    function renderLegend() {
      document.getElementById('legend').innerHTML = Object.entries(CATEGORIES).map(([key, val]) =>
        `<div class="legend-item"><div class="legend-dot" style="background:${val.color}"></div>${val.label}</div>`
      ).join('');
    }

    function renderTable() {
      const table = document.getElementById('table');
      table.innerHTML = '';
      const grid = {};
      for (const el of elements) {
        let row = el.table_row;
        if (row === 8) row = 9;
        else if (row === 9) row = 10;
        grid[`${row}-${el.table_column}`] = el;
      }

      for (let r = 1; r <= 10; r++) {
        if (r === 8) {
          for (let c = 1; c <= 18; c++) {
            const s = document.createElement('div');
            s.className = 'empty-cell';
            s.style.cssText = `grid-row:${r};grid-column:${c};height:12px`;
            table.appendChild(s);
          }
          continue;
        }
        for (let c = 1; c <= 18; c++) {
          const el = grid[`${r}-${c}`];
          if (!el) {
            const e = document.createElement('div');
            e.className = 'empty-cell';
            e.style.cssText = `grid-row:${r};grid-column:${c}`;
            table.appendChild(e);
            continue;
          }

          const tile = document.createElement('div');
          const state = (el.standard_state || '').toLowerCase();
          const metal = METALLICITY_MAP[el.category] || 'unknown';
          tile.className = 'element' + (el.is_radioactive ? ' radioactive' : '');
          tile.dataset.category = el.category;
          tile.dataset.atomicNumber = el.atomic_number;
          tile.dataset.state = state;
          tile.dataset.metal = metal;
          tile.style.cssText = `grid-row:${r};grid-column:${c}`;

          // Build inner HTML with living effects
          let effectHTML = '';
          if (state === 'gas') {
            effectHTML = '<div class="gas-particles"><span></span><span></span><span></span><span></span><span></span></div>';
          } else if (state === 'liquid') {
            effectHTML = '<div class="liquid-effect"></div>';
          }
          if (metal === 'metal') {
            effectHTML += '<div class="metal-sheen"></div>';
          }

          tile.innerHTML = `
            ${effectHTML}
            <span class="atomic-number">${el.atomic_number}</span>
            <span class="state-dot ${state}"></span>
            <span class="symbol">${el.symbol}</span>
            <span class="name">${el.name}</span>
            <span class="mass">${el.atomic_mass?.toFixed(el.atomic_mass < 10 ? 3 : 2) || '—'}</span>
          `;

          tile.addEventListener('click', () => openSidebar(el));
          table.appendChild(tile);
        }
      }
    }

    function openSidebar(el) {
      const sidebar = document.getElementById('sidebar');
      const content = document.getElementById('sidebar-content');
      const cat = CATEGORIES[el.category] || CATEGORIES.unknown;
      const state = (el.standard_state || 'solid').toLowerCase();

      const bgClass = state === 'gas' ? 'gas-bg' : state === 'liquid' ? 'liquid-bg' : 'solid-bg';

      content.innerHTML = `
        <div class="sidebar-hero">
          <div class="sidebar-symbol-wrap" style="background: var(--bg-surface); --cat-color: ${cat.color}; border: 1px solid var(--border-subtle);">
            <div class="bg-effect ${bgClass}" style="--cat-color: ${cat.color};"></div>
            <span class="sidebar-symbol" style="color: ${cat.color}">${el.symbol}</span>
          </div>
          <div class="sidebar-meta">
            <div class="atomic-num">#${el.atomic_number}</div>
            <h2>${el.name}</h2>
            <span class="category-badge" style="background: color-mix(in srgb, ${cat.color} 10%, transparent); color: ${cat.color}; border: 1px solid color-mix(in srgb, ${cat.color} 20%, transparent);">
              <span class="dot" style="background: ${cat.color}"></span>
              ${cat.label}
            </span>
          </div>
        </div>
        <div class="sidebar-props">
          <div class="prop-card">
            <div class="prop-label">Atomic Mass</div>
            <div class="prop-value">${el.atomic_mass?.toFixed(4) || '—'} <span class="prop-unit">u</span></div>
          </div>
          <div class="prop-card">
            <div class="prop-label">Density</div>
            <div class="prop-value">${el.density || '—'} <span class="prop-unit">g/cm&sup3;</span></div>
          </div>
          <div class="prop-card">
            <div class="prop-label">Melting Point</div>
            <div class="prop-value">${el.melting_point || '—'} <span class="prop-unit">K</span></div>
          </div>
          <div class="prop-card">
            <div class="prop-label">Boiling Point</div>
            <div class="prop-value">${el.boiling_point || '—'} <span class="prop-unit">K</span></div>
          </div>
          <div class="prop-card">
            <div class="prop-label">Electronegativity</div>
            <div class="prop-value">${el.electronegativity_pauling || '—'}</div>
          </div>
          <div class="prop-card">
            <div class="prop-label">State</div>
            <div class="prop-value" style="text-transform: capitalize;">${el.standard_state || '—'}</div>
          </div>
          <div class="prop-card" style="grid-column: 1 / -1;">
            <div class="prop-label">Electron Configuration</div>
            <div class="prop-value" style="font-size: 12px;">${el.electron_configuration || '—'}</div>
          </div>
        </div>
        ${el.summary ? `<p class="sidebar-summary">${el.summary.substring(0, 280)}...</p>` : ''}
        <button class="deep-dive-btn">
          Deep Dive
          <span class="arrow">&rarr;</span>
        </button>
      `;

      sidebar.classList.add('open');
      document.querySelectorAll('.element.selected').forEach(e => e.classList.remove('selected'));
      document.querySelector(`.element[data-atomic-number="${el.atomic_number}"]`)?.classList.add('selected');
    }

    function closeSidebar() {
      document.getElementById('sidebar').classList.remove('open');
      document.querySelectorAll('.element.selected').forEach(e => e.classList.remove('selected'));
    }

    function toggleTheme() {
      const html = document.documentElement;
      html.dataset.theme = html.dataset.theme === 'dark' ? 'light' : 'dark';
    }

    function setupPropChips() {
      document.querySelectorAll('.prop-chip').forEach(chip => {
        chip.addEventListener('click', () => {
          document.querySelectorAll('.prop-chip').forEach(c => c.classList.remove('active'));
          chip.classList.add('active');
        });
      });
    }

    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') closeSidebar();
    });

    init();
  </script>
</body>
</html>
